syntax = "proto3";

option go_package = "./protobuf/wallet-api";

enum ReturnCode{
  SUCCESS = 0;
  ERROR = 1;
}

enum TxStatus {
  NotFound = 0;
  Pending = 1;
  Failed = 2;
  Success = 3;
  Other = 4;
}

message EndPoint {
  string url = 1;
}

message SupportChain {
   string chain_name = 1;
   string chain_id = 2;
   string network = 3;
   repeated EndPoint end_point = 4;
}

message SupportChainRequest {
  string consumer_token = 1;
}

message SupportChainResponse {
  ReturnCode code = 1;
  string message = 2;
  repeated SupportChain chains = 3;
}


service WalletApiGateWayService {
  rpc getSupportChains(SupportChainRequest) returns (SupportChainResponse) {}
}



